<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACE | Secure Access Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=L0goN1ytJlPMNRdlnIbtGFZODjSiuJPY7q2w3H3vSVA3UqotR7SmcCqy5n8WwhJLn_M3Z4WwsP-dzZD4t4KPkKJvc5iTbEkKMUZC5omRv1pUTPfxDJLgHtr3yp-dCqX8jaUTG7cQh-fFZ1vMj-AeJOAqbxxlK00Zs3Vji5F2cisCU3esH-Fc4LvCshX1hcQUaVIXuA3EAyhxkbUjrqoFVVgSyV5AirytKn18_zq-Z0vGByyIY12YBNn3PuzCZ5NQAvmsSB3Yw0QGc-WJ5Bm7lQ" charset="UTF-8"></script><style>
        :root {
            /* Color theme updates based on request */
            --accent-color: #d1a126; /* Changed to Yellow */
            --accent-glow: rgba(209, 161, 38, 0.3);
            --bg-dark: #0a1128; /* Changed to a crisp Dark Blue */
            --panel-bg: rgba(10, 17, 40, 0.85); /* Dark Blue matching panel opacity */
            --text-main: #ffffff;
            --text-muted: #8fa0dd;
            --input-bg: #111a36;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius: 14px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            
            --btn-blue: #2f7bbd; 
            --warning-yellow: #d1a126; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            /* Grid background graphic mimicking tracking lines using matching yellow */
            background-image: 
                linear-gradient(rgba(209, 161, 38, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(209, 161, 38, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Login Container based on wireframe layout */
        .login-container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 980px;
            min-height: 600px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(209, 161, 38, 0.02);
        }

        /* Left Column: Side Banner */
        .side-banner {
            background: linear-gradient(145deg, #0f1938, #050a1a);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-right: 1px solid var(--border-color);
        }

        /* Matrix radar sweep simulation graphic */
        .side-banner::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(209, 161, 38, 0.04) 180deg, transparent 360deg);
            animation: radar-sweep 8s linear infinite;
            pointer-events: none;
        }

        .banner-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .large-scan-icon {
            font-size: 4rem;
            color: var(--accent-color);
            margin-bottom: 24px;
            text-shadow: 0 0 20px var(--accent-glow);
            animation: pulse-glow 2.5s infinite ease-in-out;
        }

        .banner-content h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* Right Column: Active Form Section */
        .form-section {
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Bar: Rebranded TRACE Identity and Social Elements */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Horizontal oval branding matching wireframe exactly */
        .brand-logo-container {
            background: rgba(209, 161, 38, 0.08);
            border: 1px solid rgba(209, 161, 38, 0.2);
            padding: 8px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent-color);
            letter-spacing: 2px;
            box-shadow: inset 0 0 10px rgba(209, 161, 38, 0.05);
        }

        .social-buttons {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .social-btn:hover {
            background: rgba(209, 161, 38, 0.05);
            color: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(209, 161, 38, 0.15);
        }

        /* Headings */
        .form-header {
            margin-bottom: 35px;
        }

        .form-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Fields formatting */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i.input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: var(--transition);
        }

        .form-group input {
            width: 100%;
            padding: 15px 18px 15px 48px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 1rem;
            color: white;
            outline: none;
            transition: var(--transition);
            background-color: var(--input-bg);
        }

        .form-group input::placeholder {
            color: rgba(143, 160, 221, 0.4);
        }

        .form-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(209, 161, 38, 0.12);
        }

        /* Interactive Focus Enhancements */
        .form-group input:focus + i.input-icon {
            color: var(--accent-color);
        }

        /* Toggle view button matching layout context */
        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }
        
        .toggle-password:hover {
            color: var(--accent-color);
        }

        /* Forgot text link placement */
        .forgot-password-wrapper {
            text-align: right;
            margin-top: -12px;
            margin-bottom: 32px;
        }

        .forgot-password {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-password:hover {
            color: var(--accent-color);
        }

        /* Core Action CTA using Yellow */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: #0a1128; /* Dark blue text inside button for strong readability */
            border: none;
            border-radius: var(--radius);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 5px 20px rgba(209, 161, 38, 0.25);
        }

        .submit-btn:hover {
            background-color: #b58a1d; /* Slightly deeper yellow on hover */
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(209, 161, 38, 0.4);
        }

        /* Registration link at base */
        .form-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: var(--transition);
        }

        .form-footer a:hover {
            text-decoration: underline;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* CSS Keyframes */
        @keyframes radar-sweep {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.04); opacity: 1; filter: drop-shadow(0 0 15px var(--accent-color)); }
        }

        /* Screen Scalability Breakpoints */
        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
                max-width: 460px;
            }
            .side-banner {
                display: none;
            }
            .form-section {
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="side-banner">
            <div class="banner-content">
                <div class="large-scan-icon">
                    <i class="fa-solid fa-fingerprint"></i>
                </div>
                <h2>SYSTEM INDEXING</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; max-width: 240px; margin: 0 auto; line-height: 1.5;">Encrypting local pathways and active data traces...</p>
            </div>
        </div>

        <div class="form-section">
            
            <div class="top-bar">
                <div class="brand-logo-container">
                    <i class="fa-solid fa-terminal"></i>TRACE
                </div>
                <div class="social-buttons">
                    <button type="button" class="social-btn" title="Authorize via Google"><i class="fa-brands fa-google"></i></button>
                    <button type="button" class="social-btn" title="Authorize via Discord"><i class="fa-brands fa-discord"></i></button>
                </div>
            </div>

            <div>
                <div class="form-header">
                    <h2>Hey, Welcome Back!</h2>
                    <p>You've Been Missed (^_^)</p>
                </div>

                <form id="traceLoginForm" onsubmit="executeTraceAuth(event)">
                    <div class="form-group">
                        <label for="username">Username / Node ID</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user-shield input-icon"></i>
                            <input type="text" id="username" placeholder="Enter node routing identity" required autocomplete="username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password / Token Key</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-key input-icon"></i>
                            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                            <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="forgot-password-wrapper">
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">LOG IN</button>
                </form>

                <!-- Sign Up Form (hidden by default) -->
                <form id="traceSignupForm" onsubmit="executeSignup(event)" style="display:none;">
                    <div class="form-group">
                        <label for="newUsername">Username</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user-shield input-icon"></i>
                            <input type="text" id="newUsername" placeholder="Choose a username" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="newEmail">Email</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope input-icon"></i>
                            <input type="email" id="newEmail" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-key input-icon"></i>
                            <input type="password" id="newPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="signupBtn">SIGN UP</button>
                </form>
            </div>

            <div class="form-footer" id="formFooter">
                Not a Member? <a href="#" id="toggleFormLink" onclick="toggleForm(event)">Register Now.</a>
            </div>

        </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordField = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const currentType = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', currentType);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        function executeTraceAuth(event) {
            event.preventDefault();
            const targetUser = document.getElementById('username').value;
            const submitAction = document.getElementById('submitBtn');

            submitAction.innerText = "AUTHENTICATING...";
            submitAction.style.pointerEvents = "none";
            submitAction.style.opacity = "0.6";

            setTimeout(() => {
                window.location.href = "trace-lost-found.html";
            }, 900);
        }

        function executeSignup(event) {
            event.preventDefault();
            const signupBtn = document.getElementById('signupBtn');

            signupBtn.innerText = "CREATING ACCOUNT...";
            signupBtn.style.pointerEvents = "none";
            signupBtn.style.opacity = "0.6";

            setTimeout(() => {
                window.location.href = "trace-lost-found.html";
            }, 900);
        }

        let isLogin = true;

        function toggleForm(event) {
            event.preventDefault();
            isLogin = !isLogin;

            const loginForm = document.getElementById('traceLoginForm');
            const signupForm = document.getElementById('traceSignupForm');
            const header = document.querySelector('.form-header h2');
            const subheader = document.querySelector('.form-header p');
            const footerLink = document.getElementById('toggleFormLink');
            const footerText = document.getElementById('formFooter');

            if (isLogin) {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                header.innerText = "Hey, Welcome Back!";
                subheader.innerText = "You've Been Missed (^_^)";
                footerText.innerHTML = 'Not a Member? <a href="#" id="toggleFormLink" onclick="toggleForm(event)">Register Now.</a>';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                header.innerText = "Create an Account";
                subheader.innerText = "Join TRACE today!";
                footerText.innerHTML = 'Already have an account? <a href="#" id="toggleFormLink" onclick="toggleForm(event)">Log In.</a>';
            }
        }
    </script>
</body>
</html>
